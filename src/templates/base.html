<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LOS SÁNCHEZ BARBER{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS integrado para el layout -->
    <style>
        /* Reset mejorado */
        body, html {
            width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        /* Contenedor principal al 100% */
        .main-container {
            width: 100vw; /* Ocupa todo el ancho visible */
            max-width: 100%;
            margin: 0;
            padding: 0;
        }
        
        /* Secciones al 100% */
        section {
            width: 100vw !important;
            max-width: 100%;
            margin: 0;
            padding: 80px 0;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
        }
        
        /* Contenedores internos centrados */
        .section-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
    </style>
    
    {% block customCSS %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <!-- Tu contenido de navbar aquí -->
    </nav>
    
    <!-- Contenido principal -->
    <main class="main-container">
        {% block body %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer>
        <!-- Tu footer aquí -->
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Tus scripts -->
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
